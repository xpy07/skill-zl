# DistillKit 蒸馏训练配置
# Teacher: Qwen3-235B → Student: Qwen3-8B

project_name: patent-agent-distill
model: Qwen/Qwen3-8B
output_path: ./output/patent-agent-model
sequence_length: 4096
resize_embeddings_to_multiple_of: 64
use_flash_attention: true

dataset:
  train_dataset:
    repo_id: ./data/logits_capture    # 本地捕获的 logit 数据
    split: train
  seed: 42
  prepacked: true

teacher:
  kind: dataset
  logprob_compressor:
    d: 151936
    k: 128
    exact_k: 16
    exact_dtype: bfloat16
    polynomial_terms: [0, 1, 2, 3, 4, "sqrt"]
    term_dtype: float32
    residual_bins: []
    delta_encoding: false
    error_diffusion: false

loss_functions:
  - function: cross_entropy
    weight: 0.3
  - function: kl
    weight: 0.5
    temperature: 2.0
    missing_probability_handling: zero
    sparse_chunk_length: 1024
  - function: hs_cosine
    weight: 0.2
    layer_mapping: all

training_args:
  num_train_epochs: 2
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 16
  save_steps: 256
  save_total_limit: 3
  logging_steps: 1
  learning_rate: 1.0e-6
  weight_decay: 0.01
  warmup_ratio: 0.05
  lr_scheduler_type: cosine
  bf16: true
  remove_unused_columns: false
  optim: paged_adamw_8bit
  gradient_checkpointing: true
  gradient_checkpointing_kwargs:
    use_reentrant: false
  report_to: wandb
