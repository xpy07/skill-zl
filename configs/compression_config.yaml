# Logit 捕获压缩配置
# 用于 distillkit.sample_logits_vllm 捕获 Teacher 的 logit 分布

logprob_compressor:
  d: 151936              # Qwen3 词表大小，根据实际模型调整
  k: 128                 # 每个 token 保留的 logprob 数量
  exact_k: 16            # 精确存储的 logprob 数量
  exact_dtype: bfloat16
  polynomial_terms: [0, 1, 2, 3, 4, "sqrt"]
  term_dtype: float32
  residual_bins: []
  delta_encoding: false
  error_diffusion: false
